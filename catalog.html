<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog | Shahanaz Textile</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAV injected by JS -->

<div class="catalog-header">
  <div class="eyebrow">Brand Catalog</div>
  <h1>Our ready designs</h1>
  <p>Minimum 10 pcs per order · Nationwide delivery · Wholesale pricing</p>
</div>

<section class="section bg-white">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Basics">Basics</button>
    <button class="filter-btn" data-cat="Corporate">Corporate</button>
    <button class="filter-btn" data-cat="Muslimah">Muslimah</button>
    <button class="filter-btn" data-cat="Premium">Premium</button>
  </div>
  <div class="product-grid" id="catalogGrid"></div>
</section>

<!-- MODAL + WA BAR + FOOTER injected by JS -->

<script src="js/shared.js"></script>
<script>
injectNav('Catalog');
injectModal(true);
injectWABar('Hi Shahanaz Textile! I would like to enquire about your catalog products.');
injectFooter();

let curCat = 'All';

function renderCatalog() {
  const list = curCat === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === curCat);
  document.getElementById('catalogGrid').innerHTML = list.map(p => `
    <div class="prod-card">
      <div class="prod-img" onclick="openModal(${p.id})">
        ${prodImg(p, 90, 160)}
        <div class="view-tabs">${VIEWS.map((_, i) => `<div class="vtab${i === 0 ? ' active' : ''}"></div>`).join('')}</div>
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-fab">${p.fab}</div>
        <div class="prod-min">Min ${p.min} pcs · ${p.category}</div>
      </div>
      <div class="prod-actions">
        <button class="btn-navy" onclick="openModal(${p.id})">View</button>
        <a href="order.html?product=${p.id}" class="btn-gold">Order</a>
      </div>
    </div>
  `).join('');
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curCat = btn.dataset.cat;
  renderCatalog();
});

renderCatalog();
</script>
</body>
</html>
