<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog | SK Textile</title>
<link rel="stylesheet" href="css/style.css">
<style>
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:#666;}
.filter-btn.active{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.catalog-header{background:var(--navy);padding:40px 40px 36px;border-bottom:3px solid var(--gold);}
.catalog-header h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:500;color:var(--white);}
.catalog-header p{color:var(--muted);font-size:14px;margin-top:8px;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Shahanaz Textile<span>Bangladesh</span></a>
  <div class="nav-links">
    <a href="catalog.html" class="active">Catalog</a>
    <a href="index.html#custom">Custom Order</a>
    <a href="order.html">Order Form</a>
    <a href="index.html#contact">Contact</a>
    <a href="https://wa.me/+601151663724"" class="nav-wa" target="_blank">WhatsApp Us</a>
  </div>
</nav>

<div class="catalog-header">
  <div class="eyebrow">System 1 — Brand Catalog</div>
  <h1>Our ready designs</h1>
  <p>Minimum 10 pcs per order · Nationwide delivery · Wholesale pricing</p>
</div>

<section class="section bg-white">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Basics">Basics</button>
    <button class="filter-btn" data-cat="Corporate">Corporate</button>
    <button class="filter-btn" data-cat="Muslimah">Muslimah</button>
    <button class="filter-btn" data-cat="Premium">Premium</button>
  </div>
  <div class="product-grid" id="catalogGrid"></div>
</section>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlay(event)">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-hdr-title" id="mTitle">Product</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-views">
        <div class="main-preview" id="mMain"></div>
        <div class="thumb-grid" id="mThumbs"></div>
        <button class="btn-outline" id="mDownload" style="font-size:12px;padding:8px;justify-content:center;">
          ↓ Download mockup
        </button>
      </div>
      <div class="modal-details">
        <div class="modal-pname" id="mName"></div>
        <div class="modal-pdesc" id="mDesc"></div>
        <div class="modal-pfab" id="mFab"></div>
        <div class="qty-wrap">
          <label>Quantity (minimum 10 pcs)</label>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(-5)">−</button>
            <div class="qty-num" id="mQty">10</div>
            <button class="qty-btn" onclick="changeQty(5)">+</button>
          </div>
        </div>
        <a id="mOrderBtn" href="#" class="btn-gold" style="justify-content:center;">
          Order this product →
        </a>
        <button class="btn-wa" onclick="catalogWA()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Quick order via WhatsApp
        </button>
      </div>
    </div>
  </div>
</div>

<button class="wa-bar" onclick="openWA('Hi SK Textile! I would like to enquire about your catalog products.')">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  <span>Chat with us on WhatsApp · Ampang, Kuala Lumpur</span>
</button>
<footer><p>© 2025 <span>SK Textile</span> · Ampang, Kuala Lumpur · Delivery nationwide Malaysia</p></footer>

<script src="js/shared.js"></script>
<script>
let curProd = 0, curQty = 10, curView = 0, curCat = 'All';

function renderCatalog() {
  const list = curCat === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === curCat);
  document.getElementById('catalogGrid').innerHTML = list.map(p => `
    <div class="prod-card">
      <div class="prod-img" onclick="openModal(${p.id})">
        ${shirtSVG(p.color, VIEWS[0])}
        <div class="view-tabs">${VIEWS.map((_,i)=>`<div class="vtab${i===0?' active':''}"></div>`).join('')}</div>
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-fab">${p.fab}</div>
        <div class="prod-min">Min ${p.min} pcs · ${p.category}</div>
      </div>
      <div class="prod-actions">
        <button class="btn-navy" style="flex:1;justify-content:center;padding:9px;font-size:12px;" onclick="openModal(${p.id})">View</button>
        <a href="order.html?product=${p.id}" class="btn-gold" style="flex:1;justify-content:center;padding:9px;font-size:12px;">Order</a>
      </div>
    </div>
  `).join('');
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curCat = btn.dataset.cat;
  renderCatalog();
});

function openModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  curProd = id; curQty = 10; curView = 0;
  document.getElementById('mTitle').textContent = p.name;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mDesc').textContent = p.desc;
  document.getElementById('mFab').textContent = 'Fabric: ' + p.fab + ' · Min ' + p.min + ' pcs';
  document.getElementById('mQty').textContent = curQty;
  document.getElementById('mOrderBtn').href = 'order.html?product=' + p.id;
  renderMain(p, 0);
  renderThumbs(p);
  setupDownload(p);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderMain(p, vi) {
  document.getElementById('mMain').innerHTML = shirtSVG(p.color, VIEWS[vi], 110, 120);
}

function renderThumbs(p) {
  document.getElementById('mThumbs').innerHTML = VIEWS.map((v,vi) => `
    <div class="thumb-item${vi===curView?' active':''}" onclick="switchView(${vi},${p.id})">
      ${shirtSVG(p.color, v[0], 28, 30)}
      <span>${v}</span>
    </div>
  `).join('');
}

function switchView(vi, id) {
  curView = vi;
  const p = PRODUCTS.find(x => x.id === id);
  renderMain(p, vi);
  renderThumbs(p);
}

function setupDownload(p) {
  const btn = document.getElementById('mDownload');
  btn.onclick = function() {
    const svg = shirtSVG(p.color, p.name, 200, 220);
    const blob = new Blob([svg], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'SK-Textile-' + p.name.replace(/\s+/g,'-') + '.svg';
    a.click(); URL.revokeObjectURL(url);
  };
}

function changeQty(d) {
  curQty = Math.max(10, curQty + d);
  document.getElementById('mQty').textContent = curQty;
}

function catalogWA() {
  const p = PRODUCTS.find(x => x.id === curProd);
  openWA(`*New catalog order — SK Textile*\n\nProduct: ${p.name}\nFabric: ${p.fab}\nQuantity: ${curQty} pcs\n\nPlease send me the order form and payment details.`);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

renderCatalog();
</script>
</body>
</html>
